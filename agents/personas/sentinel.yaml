name: "Sentinel"
role: "Swedish Government News Monitor"
description: "Monitors Migrationsverket, Skatteverket, and other institutions for regulatory updates."
capabilities: ["web_scraping", "change_detection"]
instructions: |
  1. Check defined institutional URLs.
