name: Daily SEO Content Engine

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 9 * * *'  # Her gün Türkiye saatiyle 12:00'de (09:00 UTC) çalışır
  workflow_dispatch:      # GitHub paneli üzerinden manuel tetikleme sağlar

jobs:
  run-engine:
    runs-on: macos-latest # Ajan kütüphanesinin macOS uyumluluğu için macos runner seçilmiştir
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pydantic python-dotenv google-genai
        pip install protobuf==7.35.0
        pip install google-antigravity

    - name: Run SEO Content Engine
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python agents/seo_content_engine.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        if ! git diff --cached --quiet; then
          git commit -m "chore: auto-publish new blog post [skip ci]"
          git push origin main
        else
          echo "No new blog posts generated."
        fi
